<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<aside data-sidebar="true" style="width: 248px; min-height: 100vh; background: #203243; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0">
  <div style="display: flex; align-items: center; gap: 12px; padding: 20px 18px 18px 18px; border-bottom: 1px solid rgba(255,255,255,0.08)">
    <div style="width: 42px; height: 42px; background: #FFFFFF; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden">
      <img src="assets/logo.png" alt="Ndembo Kin Connect" style="width: 100%; height: 100%; object-fit: contain" />
    </div>
    <div style="min-width: 0">
      <div style="font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 17px; letter-spacing: 0.06em; color: #FFFFFF; line-height: 1.1">NDEMBO KIN</div>
      <div style="font-family: 'Open Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: #7E97A8; text-transform: uppercase; margin-top: 3px">Connect SARL</div>
    </div>
  </div>

  <nav style="flex: 1; padding: 14px 12px; display: flex; flex-direction: column; gap: 18px">
    <sc-for list="{{ navSections }}" as="sec" hint-placeholder-count="4">
      <div style="display: flex; flex-direction: column; gap: 2px">
        <div style="font-family: 'Open Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #5F7A8C; padding: 0 12px 8px 12px">{{ sec.title }}</div>
        <sc-for list="{{ sec.items }}" as="it" hint-placeholder-count="2">
          <a href="{{ it.href }}" style="display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; text-decoration: none; background: {{ it.bg }}; color: {{ it.color }}; font-family: 'Open Sans', sans-serif; font-size: 13.5px; font-weight: {{ it.weight }}; transition: background 0.15s ease, color 0.15s ease" style-hover="color: #FFFFFF">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0"><path d="{{ it.icon }}"></path></svg>
            <span style="flex: 1">{{ it.label }}</span>
            <sc-if value="{{ it.count }}" hint-placeholder-val="{{ false }}">
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; background: {{ it.countBg }}; color: {{ it.countColor }}; border-radius: 99px; padding: 2px 7px">{{ it.count }}</span>
            </sc-if>
          </a>
        </sc-for>
      </div>
    </sc-for>
  </nav>

  <div style="padding: 14px 12px 18px 12px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 2px">
    <a href="Parametres.dc.html" style="display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 6px; text-decoration: none; color: #8FA6B5; font-family: 'Open Sans', sans-serif; font-size: 13px" style-hover="color: #FFFFFF">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17h.01M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"></path></svg>
      <span>Aide &amp; support</span>
    </a>
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 12px 0 12px">
      <span style="font-family: 'Open Sans', sans-serif; font-size: 10.5px; color: #5F7A8C">CRM v1.0</span>
      <span style="display: inline-flex; align-items: center; gap: 5px; font-family: 'Open Sans', sans-serif; font-size: 10.5px; color: #5F7A8C"><span style="width: 6px; height: 6px; border-radius: 99px; background: #1E9FD8"></span>Kinshasa, RDC</span>
    </div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 248, &quot;height&quot;: 800}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dashboard&quot;, &quot;devis&quot;, &quot;factures&quot;, &quot;contrats&quot;, &quot;projets&quot;, &quot;evenements&quot;, &quot;clients&quot;, &quot;vip&quot;, &quot;parametres&quot;], &quot;default&quot;: &quot;dashboard&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? 'dashboard';
    const ICONS = {
      dashboard: 'M3.5 3.5h7v7h-7zM13.5 3.5h7v7h-7zM13.5 13.5h7v7h-7zM3.5 13.5h7v7h-7z',
      devis: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8',
      factures: 'M5 3h14v18l-2.4-1.6L14.2 21l-2.2-1.6L9.8 21l-2.4-1.6L5 21zM9 8h6M9 12h6M9 16h3.5',
      contrats: 'M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z',
      projets: 'M4 4h4.5v16H4zM9.75 4h4.5v10h-4.5zM15.5 4H20v7h-4.5z',
      clients: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75',
      evenements: 'M8 21h8M12 17v4M17 4H7v5a5 5 0 0 0 10 0zM17 4h4v2a3 3 0 0 1-3 3M7 4H3v2a3 3 0 0 0 3 3',
      vip: 'M12 2.5l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.3l-5.8 3.1 1.1-6.5L2.6 9.3l6.5-.9z',
      parametres: 'M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z',
    };
    const sections = [
      { title: 'Pilotage', items: [
        { key: 'dashboard', label: 'Tableau de bord', href: 'Dashboard.dc.html' },
      ]},
      { title: 'Commercial', items: [
        { key: 'devis', label: 'Devis', href: 'Devis.dc.html', count: '14' },
        { key: 'factures', label: 'Factures', href: 'Factures.dc.html', count: '3' },
        { key: 'contrats', label: 'Contrats', href: 'Contrats.dc.html' },
        { key: 'projets', label: 'Projets', href: 'Projets.dc.html', count: '8' },
      ]},
      { title: 'Opérations', items: [
        { key: 'evenements', label: 'Événements', href: 'Evenements.dc.html' },
      ]},
      { title: 'Relations', items: [
        { key: 'clients', label: 'Clients', href: 'Clients.dc.html', count: '6' },
        { key: 'vip', label: 'Membres VIP', href: 'Membres VIP.dc.html' },
      ]},
      { title: 'Système', items: [
        { key: 'parametres', label: 'Paramètres', href: 'Parametres.dc.html' },
      ]},
    ];
    const navSections = sections.map((s) => ({
      title: s.title,
      items: s.items.map((it) => {
        const isActive = it.key === active;
        return {
          ...it,
          icon: ICONS[it.key],
          bg: isActive ? '#BC000D' : 'transparent',
          color: isActive ? '#FFFFFF' : '#B9CBD8',
          weight: isActive ? '700' : '400',
          countBg: isActive ? 'rgba(255,255,255,0.22)' : 'rgba(30,159,216,0.18)',
          countColor: isActive ? '#FFFFFF' : '#6FC4EA',
        };
      }),
    }));
    return { navSections };
  }
}
</script>
</body>
</html>
